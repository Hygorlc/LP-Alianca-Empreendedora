kind = "web"
previewPath = "/"
title = "Aliança Empreendedora"
version = "1.0.0"
id = "artifacts/alianca-empreendedora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21282

[services.development]
run = "pnpm --filter @workspace/alianca-empreendedora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alianca-empreendedora", "run", "build" ]
publicDir = "artifacts/alianca-empreendedora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21282"
BASE_PATH = "/"
